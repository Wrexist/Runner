; Godot iOS export preset TEMPLATE — the CI workflow substitutes the __TOKENS__
; and writes the real (gitignored) export_presets.cfg at build time.
; Hand-written for Godot 4.3; if the export step complains about a key, the
; cleanest fix is to generate a preset once in any Godot editor (any OS — the
; preset file itself is cross-platform), copy it here, and re-tokenize.

[preset.0]

name="iOS"
platform="iOS"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/ios/critterdash.ipa"

[preset.0.options]

custom_template/debug=""
custom_template/release=""
architectures/arm64=true
application/app_store_team_id="__TEAM_ID__"
application/code_sign_identity_debug=""
application/code_sign_identity_release="Apple Distribution"
application/export_method_debug=1
application/export_method_release=0
application/provisioning_profile_uuid_debug=""
application/provisioning_profile_uuid_release="__PROFILE_UUID__"
application/export_project_only=false
application/bundle_identifier="com.critterdash.app"
application/signature=""
application/short_version="1.0"
application/version="__BUILD_NUMBER__"
application/min_ios_version="14.0"
application/additional_plist_content=""
application/icon_interpolation=4
application/launch_screens_interpolation=4
capabilities/access_wifi=false
capabilities/push_notifications=false
user_data/accessible_from_files_app=false
user_data/accessible_from_itunes_sharing=false
privacy/camera_usage_description=""
privacy/microphone_usage_description=""
privacy/photolibrary_usage_description=""
privacy/file_timestamp_access_reasons=3
privacy/system_boot_time_access_reasons=1
privacy/disk_space_access_reasons=1
privacy/active_keyboard_access_reasons=0
privacy/user_defaults_access_reasons=1
icons/icon_1024x1024="res://ios/icons/icon_1024.png"
