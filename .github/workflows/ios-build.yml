# iOS build & TestFlight upload — runs on GitHub's macOS runners so shipping
# needs NO local Mac. Trigger manually (Actions tab → "iOS build" → Run workflow).
#
# Required repository secrets (how to create each WITHOUT a Mac:
# docs/NO_MAC_SHIPPING.md):
#   APPLE_TEAM_ID        Apple Developer Team ID (e.g. AB12CD34EF)
#   IOS_CERT_P12_B64     base64 of the Apple Distribution cert+key (.p12)
#   IOS_CERT_PASSWORD    password set when exporting the .p12
#   IOS_PROFILE_B64      base64 of the App Store provisioning profile (.mobileprovision)
#   ASC_KEY_ID           App Store Connect API key ID
#   ASC_ISSUER_ID        App Store Connect API issuer ID
#   ASC_KEY_P8_B64       base64 of the API key .p8 file
#
# Cost note: macOS runners bill at a high multiplier on private repos — this is
# why the workflow is manual-trigger only, not on-push.
#
# KNOWN ITERATION POINTS (expected to need 1-3 tuning runs; send me the logs):
# - export_presets.cfg keys are hand-written for Godot 4.3; the export step
#   prints verbose errors if a key is wrong or a required icon is missing.
# - The native InAppStore (IAP) plugin is NOT wired in v1 of this pipeline; the
#   stub is active, which is fine for internal TestFlight. Wire the plugin
#   before App Review (see docs/LAUNCH_PLAN.md Phase 6).

name: iOS build

on:
  workflow_dispatch:
    inputs:
      upload:
        description: "Upload to TestFlight after building"
        type: boolean
        default: true

env:
  GODOT_VERSION: "4.3-stable"
  BUNDLE_ID: "com.critterdash.app"

jobs:
  ios:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot + export templates
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/godot-bin
            ~/Library/Application Support/Godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-macos

      - name: Install Godot + export templates
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}"
          mkdir -p ~/godot-bin
          curl -fsSL -o godot.zip "${BASE}/Godot_v${GODOT_VERSION}_macos.universal.zip"
          unzip -q godot.zip -d ~/godot-bin
          curl -fsSL -o templates.tpz "${BASE}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          TPL_DIR="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION/-stable/.stable}"
          mkdir -p "$TPL_DIR"
          unzip -q templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* "$TPL_DIR/"

      - name: Import signing certificate + provisioning profile
        env:
          P12_B64: ${{ secrets.IOS_CERT_P12_B64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          PROFILE_B64: ${{ secrets.IOS_PROFILE_B64 }}
        run: |
          set -euo pipefail
          # Throwaway keychain for this run.
          KC=build.keychain
          security create-keychain -p ci "$KC"
          security default-keychain -s "$KC"
          security unlock-keychain -p ci "$KC"
          security set-keychain-settings -t 3600 "$KC"
          echo "$P12_B64" | base64 --decode > cert.p12
          security import cert.p12 -k "$KC" -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k ci "$KC"
          # Provisioning profile where Xcode looks for it.
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_B64" | base64 --decode > profile.mobileprovision
          UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
          cp profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          echo "PROFILE_UUID=$UUID" >> "$GITHUB_ENV"
          rm cert.p12

      - name: Generate export_presets.cfg from template
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          # Build number = run number so every upload is unique.
          sed -e "s/__TEAM_ID__/${TEAM_ID}/g" \
              -e "s/__PROFILE_UUID__/${PROFILE_UUID}/g" \
              -e "s/__BUILD_NUMBER__/${GITHUB_RUN_NUMBER}/g" \
              ios/export_presets.ios.template.cfg > export_presets.cfg

      - name: Import assets (headless)
        run: ~/godot-bin/Godot.app/Contents/MacOS/Godot --headless --path . --import || true

      - name: Run logic tests (gate the build)
        run: |
          ~/godot-bin/Godot.app/Contents/MacOS/Godot --headless --path . res://tests/Tests.tscn 2>&1 | tee tests.log
          grep -q "TESTS: ALL PASS" tests.log

      - name: Export iOS project / IPA
        run: |
          set -euo pipefail
          mkdir -p build/ios
          ~/godot-bin/Godot.app/Contents/MacOS/Godot --headless --path . \
            --export-release "iOS" "build/ios/critterdash.ipa" 2>&1 | tee export.log
          echo "--- export output files ---"
          find build/ios -maxdepth 2 | head -50

      - name: Fallback — xcodebuild if Godot left an Xcode project instead of an IPA
        run: |
          set -euo pipefail
          if [ -f build/ios/critterdash.ipa ]; then
            echo "IPA produced directly by Godot — skipping xcodebuild."
            exit 0
          fi
          PROJ=$(find build/ios -name "*.xcodeproj" -maxdepth 2 | head -1)
          if [ -z "$PROJ" ]; then
            echo "::error::No .ipa and no .xcodeproj found — read export.log above"
            exit 1
          fi
          xcodebuild -project "$PROJ" -scheme "$(basename "${PROJ%.xcodeproj}")" \
            -configuration Release -archivePath build/ios/app.xcarchive \
            -destination 'generic/platform=iOS' archive \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"
          xcodebuild -exportArchive -archivePath build/ios/app.xcarchive \
            -exportOptionsPlist ios/export_options.plist \
            -exportPath build/ios
          mv build/ios/*.ipa build/ios/critterdash.ipa

      - name: Upload IPA artifact (always, for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: critterdash-ipa
          path: build/ios/critterdash.ipa
          if-no-files-found: error

      - name: Upload to TestFlight
        if: ${{ inputs.upload }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_B64: ${{ secrets.ASC_KEY_P8_B64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_P8_B64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          xcrun altool --upload-app -f build/ios/critterdash.ipa -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
